<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Assignments | Student Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/student.css">
    <style>
        /* Additional styles for assignments page */
        .assignments-container {
            max-width: 600px;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }
        .assignments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .assignments-header h2 {
            font-size: 1.2rem;
        }
        .assignments-header .back-link {
            color: var(--primary-500);
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .assignments-header .back-link:hover {
            text-decoration: underline;
        }
        .assignment-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 0.75rem 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .assignment-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .assignment-card .card-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .assignment-card .card-title strong {
            font-size: 0.95rem;
        }
        .assignment-card .card-title .type-icon {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .assignment-card .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.25rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .assignment-card .card-meta span {
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
        }
        .filter-select {
            width: 100%;
            padding: 0.5rem;
            border: 1.5px solid var(--border-main);
            border-radius: var(--radius-md);
            background: var(--bg-elevated);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.9rem;
        }
        .filter-select:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
    </style>
</head>
<body>

<!-- Header with Dark Mode Toggle -->
<div class="student-header">
    <div class="student-header-content">
        <div class="student-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Class<span style="color: var(--primary-600);">Track</span></span>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Dark mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>
</div>

<div class="assignments-container">
    <div class="assignments-header">
        <h2>Assignments & Updates</h2>
        <a href="index.html" class="back-link">← Back to Attendance</a>
    </div>

    <div style="margin-bottom: 1rem;">
        <select id="studentAssignFilter" class="filter-select">
            <option value="">All Courses</option>
            <option value="CCS304">Telecommunication Networks</option>
            <option value="CIIT302">Advanced Intelligent Networks</option>
            <option value="CIIT306">Routing and Switching Technologies</option>
            <option value="CIIT332">Software Defined Networks</option>
            <option value="CIIT352">Windows Server Administration</option>
            <option value="SCOT322">Sociology of Technology</option>
        </select>
    </div>

    <div id="studentAssignmentsContainer">
        <div style="text-align: center; padding: 2rem;">
            <div class="loading-spinner" style="margin: 0 auto; display: block;"></div>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Loading assignments...</p>
        </div>
    </div>
</div>

<!-- Modal for assignment details -->
<div id="assignmentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background: var(--bg-elevated); max-width: 500px; width: 90%; border-radius: var(--radius-xl); padding: 1.5rem; position: relative; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-xl);">
        <button id="closeModalBtn" style="position: absolute; top: 0.5rem; right: 0.75rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); transition: var(--transition-fast);">✕</button>
        <h3 id="modalTitle" style="margin-bottom: 0.5rem; font-size: 1.2rem; color: var(--text-primary);"></h3>
        <p style="margin-bottom: 0.25rem;"><strong>Course:</strong> <span id="modalCourse"></span></p>
        <p style="margin-bottom: 0.25rem;"><strong>Due Date:</strong> <span id="modalDue"></span></p>
        <p style="margin-bottom: 0.25rem;"><strong>Status:</strong> <span id="modalStatus"></span></p>
        <hr style="margin: 1rem 0; border-color: var(--border-light);">
        <p id="modalDescription" style="white-space: pre-wrap; line-height: 1.6; color: var(--text-secondary);"></p>
    </div>
</div>

<script src="js/shared.js"></script>
<script src="js/assignments.js"></script>
</body>
</html>
