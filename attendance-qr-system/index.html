<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mark Attendance | Student Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/student.css">
</head>
<body>

<!-- Header with Dark Mode Toggle -->
<div class="student-header">
    <div class="student-header-content">
        <div class="student-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Class<span style="color: var(--primary-600);">Track</span></span>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Dark mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>
</div>

<div class="attendance-card">
    <div class="card-header">
        <div class="header-icon">📋</div>
        <h1>Mark Attendance</h1>
        <p>Scan QR code to access this page</p>
    </div>
    
    <div class="session-info" id="sessionInfo">
        <div class="status-dot"></div>
        <span id="sessionStatusText">Loading session...</span>
    </div>
    <div class="countdown-timer" id="countdownTimer" style="display: none; text-align: center; padding: 0.5rem; background: var(--gray-50); border-radius: 0.5rem; margin: 0 1rem;">
        <span style="font-size: 0.7rem; color: var(--gray-500);">Session expires in:</span>
        <span id="countdownDisplay" style="font-size: 1rem; font-weight: 700; color: var(--primary-600);">--:--</span>
    </div>

    <div class="location-status" id="locationStatus" style="display: none; margin: 0 1rem 1rem 1rem; padding: 0.5rem; border-radius: 0.5rem; font-size: 0.75rem;">
        <span id="locationMessage"> Checking location...</span>
    </div>
    
    <div class="card-body">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="studentName" placeholder="Enter your full name" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>Index Number / Student ID</label>
            <input type="text" id="studentIndex" placeholder="Enter your index number" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>Course</label>
            <input type="text" id="courseDisplay" readonly disabled style="background: var(--gray-100);">
        </div>
        
        <button class="btn-submit" id="submitBtn">
            <span class="btn-text">Submit Attendance</span>
            <span class="btn-loader" style="display: none;">⏳</span>
        </button>
        
        <div class="message" id="message"></div>
    </div>
    
    <div class="card-footer">
        <p>Attendance recorded in real-time • One entry per session</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="js/shared.js"></script>
<script src="js/student.js"></script>
</body>
</html>
